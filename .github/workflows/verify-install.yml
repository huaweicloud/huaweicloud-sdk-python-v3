name: Verify Install
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Check
      run: |
        version=$(cat VERSION)
        pip install huaweicloudsdkall=="$version"
