name: Publish Check
permissions:
  contents: read
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Check
      run: |
        find . -type d -maxdepth 2 -mindepth 2 -name "huaweicloudsdk*" ! -name "huaweicloudsdkcore"
      shell: bash
